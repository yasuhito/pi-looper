name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run static and formatting checks
        run: npm run lint

      - name: Run TypeScript type checks
        run: npm run typecheck

      - name: Check shell automation syntax
        run: bash -n extensions/pi-looper/automations/*.sh

      - name: Check Python automation syntax
        run: python3 -m py_compile extensions/pi-looper/automations/*.py

      - name: Check package contents
        run: npm pack --dry-run
